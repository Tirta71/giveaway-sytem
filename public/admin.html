<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Giveaway Admin</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 208, 132, 0.14), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.12), transparent 35%),
        #0f0f0f;
      color: white;
      padding: 28px;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .title h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
    }

    .title p {
      margin: 6px 0 0;
      color: #aaa;
      font-size: 15px;
    }

    .status-pill {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: rgba(31,31,31,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
      border-radius: 16px;
    }

    .stat-label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-ok {
      color: #00d084;
    }

    .status-bad {
      color: #ff4d4d;
    }

    .status-warn {
      color: #ffcc00;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      font-size: 15px;
      background: #2b2b2b;
      color: white;
      outline: none;
      margin-bottom: 10px;
    }

    input:focus {
      border-color: rgba(0,208,132,0.8);
      box-shadow: 0 0 0 3px rgba(0,208,132,0.14);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      background: #00d084;
      color: #06130d;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    button:active {
      transform: translateY(0);
    }

    .btn-warn {
      background: #ffcc00;
      color: #111;
    }

    .btn-danger {
      background: #ff4d4d;
      color: white;
    }

    .btn-blue {
      background: #35a7ff;
      color: white;
    }

    .winner-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(0,208,132,0.12);
      border: 1px solid rgba(0,208,132,0.28);
      min-height: 78px;
    }

    .winner-name {
      font-size: 26px;
      font-weight: 900;
      color: #00d084;
      word-break: break-word;
    }

    .participants-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .participants-top h2 {
      margin: 0;
    }

    .small-info {
      color: #aaa;
      font-size: 14px;
    }

    .participants-list {
      max-height: 650px;
      overflow-y: auto;
      padding: 0;
      margin: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 0;
    }

    .participant-item:hover {
      background: rgba(255,255,255,0.10);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      object-fit: cover;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.25), transparent 40%),
        linear-gradient(135deg, rgba(0,208,132,0.7), rgba(53,167,255,0.65));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: white;
      min-width: 46px;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .info {
      min-width: 0;
    }

    .name {
      font-size: 17px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 18px;
      text-align: center;
      color: #aaa;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .participants-list {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title">
        <h1>🎁 Giveaway Admin</h1>
        <p>Control panel untuk join otomatis TikTok Live</p>
      </div>

      <div class="status-pill">
        TikTok: <span id="connected">-</span>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>Status</h2>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">Giveaway</div>
              <div class="stat-value" id="active">-</div>
            </div>

            <div class="stat">
              <div class="stat-label">Peserta</div>
              <div class="stat-value" id="count">0</div>
            </div>

            <div class="stat">
              <div class="stat-label">Keyword</div>
              <div class="stat-value" id="keywordText">JOIN</div>
            </div>

            <div class="stat">
              <div class="stat-label">Room ID</div>
              <div class="stat-value" id="roomId" style="font-size: 14px;">-</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Kontrol Tampilan</h2>

          <input id="giveawayTitle" value="🎁 GIVEAWAY LIVE" placeholder="Judul giveaway" />
          <input id="giveawaySubtitle" value="Ketik keyword di chat untuk masuk daftar peserta" placeholder="Subtitle overlay" />
          <input id="keyword" value="JOIN" placeholder="Keyword join" />

          <div class="control-row">
            <button onclick="startGiveaway()">Buka Join</button>
            <button class="btn-warn" onclick="stopGiveaway()">Tutup Join</button>
            <button class="btn-blue" onclick="saveSettings()">Update Tampilan</button>
            <button class="btn-blue" onclick="drawWinner()">Pilih Pemenang</button>
            <button class="btn-danger" onclick="resetGiveaway()">Reset</button>
          </div>
        </div>

        <div class="card">
          <h2>Tambah Manual</h2>

          <input id="manualUsername" placeholder="username tanpa @" />
          <input id="manualAvatar" placeholder="link avatar optional" />

          <button onclick="manualAdd()">Tambah Peserta</button>
        </div>

        <div class="card">
          <h2>Pemenang</h2>

          <div class="winner-card" id="winner">
            <span>-</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="participants-top">
          <h2>Peserta</h2>
          <div class="small-info" id="participantsInfo">0 peserta</div>
        </div>

        <ul class="participants-list" id="participants"></ul>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();

    function getUsername(user) {
      if (typeof user === "string") return user;

      return (
        user?.username ||
        user?.uniqueId ||
        user?.name ||
        user?.nickname ||
        ""
      );
    }

    function getNickname(user) {
      if (typeof user === "string") return user;

      return (
        user?.nickname ||
        user?.username ||
        user?.uniqueId ||
        ""
      );
    }

    function getAvatar(user) {
      if (typeof user === "string") return "";

      return (
        user?.avatar ||
        user?.avatarUrl ||
        user?.profilePictureUrl ||
        user?.avatarThumb ||
        user?.avatarMedium ||
        user?.avatarLarger ||
        ""
      );
    }

    function cleanName(user) {
      return String(getUsername(user) || "").replace(/^@/, "").trim();
    }

    function initial(user) {
      const name = cleanName(user);
      return name ? name[0].toUpperCase() : "?";
    }

    function createAvatar(user) {
      const avatarUrl = getAvatar(user);

      if (avatarUrl) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.src = avatarUrl;
        img.alt = cleanName(user);

        img.onerror = () => {
          const fallback = document.createElement("div");
          fallback.className = "avatar";
          fallback.textContent = initial(user);
          img.replaceWith(fallback);
        };

        return img;
      }

      const fallback = document.createElement("div");
      fallback.className = "avatar";
      fallback.textContent = initial(user);

      return fallback;
    }

    function renderWinner(winner) {
      const winnerEl = document.getElementById("winner");
      winnerEl.innerHTML = "";

      if (!winner) {
        const empty = document.createElement("span");
        empty.textContent = "-";
        winnerEl.appendChild(empty);
        return;
      }

      const avatar = createAvatar(winner);

      const wrap = document.createElement("div");
      wrap.className = "info";

      const name = document.createElement("div");
      name.className = "winner-name";
      name.textContent = "@" + cleanName(winner);

      const sub = document.createElement("div");
      sub.className = "sub";
      sub.textContent = getNickname(winner);

      wrap.appendChild(name);
      wrap.appendChild(sub);

      winnerEl.appendChild(avatar);
      winnerEl.appendChild(wrap);
    }

    function renderParticipants(participants) {
      const ul = document.getElementById("participants");
      ul.innerHTML = "";

      if (participants.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent = "Belum ada peserta";
        ul.appendChild(empty);
        return;
      }

      participants.forEach((user) => {
        const li = document.createElement("li");
        li.className = "participant-item";

        const avatar = createAvatar(user);

        const info = document.createElement("div");
        info.className = "info";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = "@" + cleanName(user);

        const sub = document.createElement("div");
        sub.className = "sub";

        const nickname = getNickname(user);
        const avatarStatus = getAvatar(user) ? "avatar ada" : "avatar kosong";

        sub.textContent = nickname && nickname !== cleanName(user)
          ? `${nickname} • ${avatarStatus}`
          : avatarStatus;

        info.appendChild(name);
        info.appendChild(sub);

        li.appendChild(avatar);
        li.appendChild(info);

        ul.appendChild(li);
      });
    }

    function fillInputIfNotFocused(id, value) {
      const el = document.getElementById(id);

      if (document.activeElement !== el) {
        el.value = value;
      }
    }

    function render(data) {
      const participants = Array.isArray(data.participants) ? data.participants : [];

      document.getElementById("connected").innerHTML = data.connected
        ? `<span class="status-ok">Connected</span>`
        : `<span class="status-bad">Disconnected</span>`;

      document.getElementById("active").innerHTML = data.active
        ? `<span class="status-ok">Dibuka</span>`
        : `<span class="status-warn">Ditutup</span>`;

      document.getElementById("keywordText").textContent = data.keyword || "JOIN";
      document.getElementById("count").textContent = participants.length;
      document.getElementById("participantsInfo").textContent = `${participants.length} peserta`;
      document.getElementById("roomId").textContent = data.liveRoomId || "-";

      fillInputIfNotFocused("keyword", data.keyword || "JOIN");
      fillInputIfNotFocused("giveawayTitle", data.title || "🎁 GIVEAWAY LIVE");
      fillInputIfNotFocused(
        "giveawaySubtitle",
        data.subtitle || "Ketik keyword di chat untuk masuk daftar peserta"
      );

      renderWinner(data.winner);
      renderParticipants(participants);
    }

    socket.on("giveaway:update", render);

    async function saveSettings() {
      const title = document.getElementById("giveawayTitle").value || "🎁 GIVEAWAY LIVE";
      const subtitle =
        document.getElementById("giveawaySubtitle").value ||
        "Ketik keyword di chat untuk masuk daftar peserta";
      const keyword = document.getElementById("keyword").value || "JOIN";

      await fetch("/api/settings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title,
          subtitle,
          keyword
        })
      });
    }

    async function startGiveaway() {
      const title = document.getElementById("giveawayTitle").value || "🎁 GIVEAWAY LIVE";
      const subtitle =
        document.getElementById("giveawaySubtitle").value ||
        "Ketik keyword di chat untuk masuk daftar peserta";
      const keyword = document.getElementById("keyword").value || "JOIN";

      await fetch("/api/start", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title,
          subtitle,
          keyword
        })
      });
    }

    async function stopGiveaway() {
      await fetch("/api/stop", {
        method: "POST"
      });
    }

    async function resetGiveaway() {
      if (!confirm("Reset semua peserta?")) return;

      await fetch("/api/reset", {
        method: "POST"
      });
    }

    async function drawWinner() {
      await fetch("/api/draw", {
        method: "POST"
      });
    }

    async function manualAdd() {
      const username = document.getElementById("manualUsername").value.trim();
      const avatar = document.getElementById("manualAvatar").value.trim();

      if (!username) return;

      await fetch("/api/manual-add", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username,
          avatar
        })
      });

      document.getElementById("manualUsername").value = "";
      document.getElementById("manualAvatar").value = "";
    }
  </script>
</body>
</html>
